name: qadaya_lawyersys
description: Qadaya LawyerSys mobile application
publish_to: none
version: 0.1.0
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  dio: ^5.3.0
  sqflite: ^2.2.7
  path: ^1.9.0
  flutter_secure_storage: ^10.0.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  local_auth: ^3.0.1
  intl: ^0.20.2
  shared_preferences: ^2.2.0
  path_provider: ^2.0.17
  url_launcher: ^6.1.10
  image_picker: ^1.1.2
  connectivity_plus: ^7.1.1
  table_calendar: ^3.0.8
  flutter_pdfview: ^1.2.3
  photo_view: ^0.15.0
  flutter_cache_manager: ^3.3.1
  signalr_netcore: ^1.3.7
  # Enhancement dependencies
  sentry_flutter: ^8.14.2
  shimmer: ^3.0.0
  dartz: ^0.10.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1
  cached_network_image: ^3.3.1
  get_it: ^9.2.1
  injectable: ^3.0.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.4
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  injectable_generator: ^3.0.2

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
