name: Mobile Build

on:
  workflow_dispatch:
  push:
    branches: [ "main", "003-flutter-mobile-app" ]
  pull_request:
    branches: [ "main", "003-flutter-mobile-app" ]

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MobileApp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Generate Android platform files
        run: flutter create . --platforms android

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icons
        run: flutter pub run flutter_launcher_icons

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lawyersys-mobile-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: MobileApp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Generate iOS platform files
        run: flutter create . --platforms ios

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icons
        run: flutter pub run flutter_launcher_icons

      - name: Run tests
        run: flutter test

      - name: Build IPA
        run: flutter build ios --release --no-codesign

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: lawyersys-mobile-release-ipa
          path: build/ios/iphoneos/Runner.app
          if-no-files-found: error