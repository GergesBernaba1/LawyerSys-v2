name: Mobile Build

on:
  workflow_dispatch:

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Generate Android platform files
        working-directory: MobileApp
        run: flutter create . --platforms android

      - name: Install dependencies
        working-directory: MobileApp
        run: flutter pub get

      - name: Generate app icons
        working-directory: MobileApp
        run: dart run flutter_launcher_icons

      - name: Run tests
        working-directory: MobileApp
        run: flutter test

      - name: Build release APK
        working-directory: MobileApp
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lawyersys-mobile-release-apk
          path: MobileApp/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Precache Flutter iOS artifacts
        run: flutter precache --ios

      - name: Generate iOS platform files
        working-directory: MobileApp
        run: flutter create . --platforms ios

      - name: Restore custom Podfile and xcconfig
        working-directory: MobileApp/ios
        run: |
          cat > Podfile << 'EOF'
          platform :ios, '14.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          flutter_root = ENV['FLUTTER_ROOT']
          raise "FLUTTER_ROOT not set." if flutter_root.nil? || flutter_root.empty?

          require File.expand_path(File.join(flutter_root, 'packages', 'flutter_tools', 'bin', 'podhelper'))

          use_frameworks! :linkage => :static

          target 'Runner' do
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
                config.build_settings['DEFINES_MODULE'] = 'YES'
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
              end
            end
          end
          EOF
          echo 'CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES = YES' >> Flutter/Debug.xcconfig
          echo 'CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES = YES' >> Flutter/Release.xcconfig

      - name: Install dependencies
        working-directory: MobileApp
        run: flutter pub get

      - name: Run CocoaPods install
        working-directory: MobileApp/ios
        run: pod install

      - name: Run tests
        working-directory: MobileApp
        run: flutter test

      - name: Build IPA
        working-directory: MobileApp
        run: flutter build ios --release --no-codesign

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: lawyersys-mobile-release-ipa
          path: MobileApp/build/ios/iphoneos/Runner.app
          if-no-files-found: error
